# Shopkeeper nginx config — Docker Compose deployment
#
# Serves:
#   /            → Next.js static export (built into nginx image)
#   /ws/         → WebSocket proxy to shopkeeper:8765
#   /api/        → REST API proxy to shopkeeper:8080
#   /.well-known → ACME challenge for Let's Encrypt
#
# TLS certs mounted from /etc/letsencrypt (certbot volume).
# Before first cert exists, only the port-80 server block works.
# Run deploy/init-certs.sh to obtain the initial certificate.

server_tokens off;

upstream shopkeeper_ws {
    server shopkeeper:8765;
}

upstream shopkeeper_api {
    server shopkeeper:8080;
}

# ─── Port 80: ACME challenge + HTTPS redirect ───
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Port 443: TLS termination ───
# NOTE: This block requires valid certs in /etc/letsencrypt.
# On first deploy, run deploy/init-certs.sh before starting nginx
# with TLS, or temporarily comment out this block.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Static frontend (Next.js export) ───
    root /var/www/shopkeeper;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # ─── WebSocket proxy ───
    location /ws/ {
        proxy_pass http://shopkeeper_ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ─── REST API proxy ───
    location /api/ {
        proxy_pass http://shopkeeper_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ─── Security headers ───
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
