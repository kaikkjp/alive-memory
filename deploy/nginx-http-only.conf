# Temporary nginx config — HTTP only, for initial TLS cert provisioning.
# Used by deploy/init-certs.sh. Replaced by deploy/nginx.conf after certs exist.

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Shopkeeper is setting up TLS...';
        add_header Content-Type text/plain;
    }
}
