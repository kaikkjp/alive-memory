# TASK-095 Phase 4: Nginx config for alive.kaikk.jp (multi-agent platform).
#
# Architecture:
#   alive.kaikk.jp/                → Manager portal (Next.js)
#   alive.kaikk.jp/agent/<id>/api/ → Per-agent API proxy (from nginx-agents.conf)
#
# Agent routes are auto-generated by scripts/nginx_regen.sh into
# deploy/nginx-agents.conf, which is included below.
#
# TLS via Let's Encrypt (certbot).

server_tokens off;

# ── HTTP → HTTPS redirect + ACME challenge ──
server {
    listen 80;
    server_name alive.kaikk.jp;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (main) ──
server {
    listen 443 ssl;
    http2 on;
    server_name alive.kaikk.jp;

    # TLS
    ssl_certificate     /etc/letsencrypt/live/alive.kaikk.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alive.kaikk.jp/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Manager portal (Next.js static export) ──
    root /var/www/lounge;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # ── Per-agent API proxies (auto-generated) ──
    include /etc/nginx/conf.d/nginx-agents.conf;

    # ── Portal API routes (Next.js API, if running as server) ──
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
