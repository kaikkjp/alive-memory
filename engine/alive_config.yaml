# ============================================================
# ALIVE Cognitive Architecture — Configuration
# ============================================================
# Every behavioral constant lives here. No magic numbers in code.
# To experiment: copy this file, change values, run with --config.
#
# Two categories:
#   [DB] = managed via self_parameters DB table + p() accessor
#         (runtime-tunable, modification logging, bounds checking)
#         These values serve as documentation + seed defaults.
#   [CODE] = loaded from this YAML via cfg() accessor
#         (file-based, swap for experiments via --config)
# ============================================================

# ----------------------------------------------------------
# HYPOTHALAMUS — drives & mood mechanics  [CODE constants]
# ----------------------------------------------------------
hypothalamus:
  valence_hard_floor: -0.85            # HOTFIX-002: minimum valence (she's miserable but not catatonic)
  max_valence_delta_per_cycle: 0.10    # HOTFIX-002: per-cycle mood inertia clamp
  valence_equilibrium: 0.05            # must match hypothalamus.equilibria.mood_valence in DB
  exponential_spring_distance: 0.5     # distance threshold for exponential homeostatic pull
  exponential_spring_multiplier: 3.0   # rubber band multiplier past distance threshold

  # Drive-to-feeling thresholds (drives_to_feeling text generation)
  feeling_social_high: 0.8
  feeling_social_mid: 0.6
  feeling_social_low: 0.2
  feeling_energy_low: 0.3
  feeling_energy_high: 0.8
  feeling_curiosity_high: 0.7
  feeling_curiosity_mid: 0.5
  feeling_curiosity_low: 0.15
  feeling_expression_high: 0.7
  feeling_valence_low: -0.5
  feeling_valence_high: 0.5

  # Epistemic curiosity thresholds (feeling text)
  epistemic_min_intensity: 0.05
  epistemic_strong_intensity: 0.7
  epistemic_moderate_intensity: 0.4
  epistemic_secondary_min: 0.3
  epistemic_secondary_max: 2

# ----------------------------------------------------------
# HABIT POLICY — drive-coupled journal reflex  [CODE constants]
# ----------------------------------------------------------
habit_policy:
  journal:
    expression_threshold: 0.6          # expression_need must exceed this
    cooldown_cycles: 80                # min cycles between journals
    no_visitor_window: 5               # must have no visitor for N recent cycles
    priority: 0.75                     # base priority when triggered
    diminishing_factor: 0.6            # priority *= this per journal in current day
    mood_boost_amount: 0.1             # priority boost when mood is low
    mood_boost_threshold: -0.2         # valence below this triggers mood boost

# ----------------------------------------------------------
# CORTEX — LLM call management  [CODE constants]
# ----------------------------------------------------------
cortex:
  api_call_timeout: 60.0               # hard timeout per request (seconds)
  daily_cycle_cap: 500                 # max cortex calls per day
  max_consecutive_failures: 3          # before circuit breaker opens
  circuit_open_seconds: 300            # 5-minute cooldown when circuit opens
  rumination_threshold: 5              # consecutive cycles before thread decay
  rumination_decay_factor: 0.3         # per-cycle priority decay past threshold
  idle_temperature: 0.4                # LLM temperature for idle cycles
  engage_temperature: 0.7              # LLM temperature for engage cycles

# ----------------------------------------------------------
# BASAL GANGLIA — action gating  [CODE constants]
# ----------------------------------------------------------
basal_ganglia:
  # Drive gates: action -> (drive_field, threshold)
  # Habits only fire when the relevant drive supports the action.
  drive_gates:
    write_journal:   { field: expression_need, threshold: 0.2 }
    express_thought: { field: expression_need, threshold: 0.2 }
    post_x_draft:    { field: expression_need, threshold: 0.2 }
    speak:           { field: social_hunger, threshold: 0.3 }
    rearrange:       { field: energy, threshold: 0.3 }
    place_item:      { field: energy, threshold: 0.3 }
    open_shop:       { field: energy, threshold: 0.3 }
    # close_shop: no drive gate (TASK-106: rest_need removed, shop gate handles it)

  # Disengagement: when absorbed, low-impulse conversation suppressed
  disengagement_expression_threshold: 0.7
  disengagement_impulse_threshold: 0.4

  # modify_self requires recent reflection evidence within this window
  reflection_evidence_window: 3

# ----------------------------------------------------------
# LLM CLIENT — retry & transport  [CODE constants]
# ----------------------------------------------------------
llm:
  max_retry_attempts: 3
  backoff_delays: [2, 4, 8]            # seconds between retries
  connect_timeout: 10.0                # connection timeout (seconds)
  retryable_status_codes: [429, 500, 502, 503]

# ----------------------------------------------------------
# SLEEP META-REVIEW  [CODE constants]
# ----------------------------------------------------------
sleep_meta:
  trait_stability_increment: 0.2       # stability increase per 3x confirmation
  trait_stability_max: 1.0
  trait_recent_window: 3               # check consistency of last N observations
  anomaly_expiration_days: 7           # archive unconfirmed anomalies after N days
  drive_deviation_threshold: 0.4       # revert param if drive deviates this much
  auto_promote_threshold: 5            # promote pending actions after N attempts

# ----------------------------------------------------------
# SLEEP CONSOLIDATION  [CODE constants]
# ----------------------------------------------------------
sleep_consolidation:
  journal_mood_bonus: 0.04             # sleep quality per waking journal
  journal_mood_bonus_cap: 0.1          # max mood boost from journals
  cold_search_limit: 3                 # max cold memory echoes per moment

# ----------------------------------------------------------
# SIMULATION — run defaults  [CODE constants]
# ----------------------------------------------------------
sim:
  default_cycles: 1000
  default_seed: 42
  default_daily_budget: 1.0
  default_output_dir: "sim/results"

# ----------------------------------------------------------
# META-CONTROLLER — metric-driven self-tuning (TASK-090)
# ----------------------------------------------------------
# Runs once per sleep cycle. Reads behavioral metrics, compares against
# target ranges, proposes bounded parameter adjustments.
# Three-tier hierarchy: Operator hard floor > Meta-controller > Conscious modify_self.
meta_controller:
  enabled: true
  evaluation_window: 50          # cycles to look back for metric calculation
  min_cycles_before_adjust: 100  # don't adjust if system just started
  max_adjustments_per_sleep: 2   # cap changes per sleep cycle
  cooldown_cycles: 200           # min cycles between adjusting same param

  # Target metric ranges — the operator's definition of "healthy"
  # All target min/max are in NORMALIZED scale (0.0–1.0).
  # Raw collector values are normalized via `normalize` before comparison:
  #   initiative_rate: raw 0–100 (percent) → /100 → 0.0–1.0
  #   emotional_range: raw 0–125 (bin count) → /125 → 0.0–1.0
  targets:
    initiative_rate:
      min: 0.12
      max: 0.35
      metric: initiative_rate    # maps to metrics_snapshots.metric_name
      normalize: 100.0           # divide raw value by this to get 0–1 scale
    emotional_range:
      min: 0.3
      max: 0.8
      metric: emotional_range
      normalize: 125.0           # 5^3 possible bins
    # Future metrics (uncomment when production collectors exist):
    # action_diversity:
    #   min: 0.5
    #   max: 0.9
    #   metric: action_diversity

  # Parameter-metric mapping — which knobs affect which metrics
  # Direction: +1 means "raising this param raises the metric"
  # Step: how much to adjust per intervention
  adjustments:
    initiative_rate:
      - param: hypothalamus.equilibria.diversive_curiosity
        direction: 1
        step: 0.03
        priority: 1
      - param: hypothalamus.equilibria.expression_need
        direction: 1
        step: 0.03
        priority: 2
    emotional_range:
      - param: hypothalamus.equilibria.mood_arousal
        direction: 1
        step: 0.02
        priority: 1

  # Operator hard floor — non-negotiable bounds
  # These override ALL other bounds, including self_parameters table bounds
  hard_floor:
    hypothalamus.equilibria.diversive_curiosity: [0.2, 0.8]
    hypothalamus.equilibria.social_hunger: [0.3, 0.9]
    hypothalamus.equilibria.expression_need: [0.2, 0.8]
    hypothalamus.equilibria.mood_valence: [-0.85, 0.5]
    hypothalamus.equilibria.mood_arousal: [0.1, 0.7]
    hypothalamus.equilibria.rest_need: [0.1, 0.5]

# ----------------------------------------------------------
# IDENTITY EVOLUTION — three-tier drift resolution (TASK-092)
# ----------------------------------------------------------
# Runs once per sleep cycle AFTER meta-controller.
# Resolves the philosophical gate: who decides growth vs drift?
#   Tier 1 (Operator): protected_traits + hard_floor bounds
#   Tier 2 (Homeostasis): meta-controller automatic corrections
#   Tier 3 (Conscious): modify_self actions with protection window
identity_evolution:
  enabled: true
  conscious_protection_cycles: 500   # cycles to protect conscious modify_self choices (~2 days)
  baseline_shift_window: 1000        # cycles to measure organic baseline shift
  organic_growth_threshold: 0.15     # min baseline shift magnitude to count as organic growth
  max_updates_per_sleep: 1           # rate limit — one evolution decision per sleep
  min_sustained_cycles: 3            # drift must persist this many cycles before acting
  drift_magnitude_threshold: 0.05    # minimum param drift to trigger evaluation
  protected_traits:                  # core safety traits — cannot be evolved away
    - warmth_toward_visitors
    - honesty
    - non_hostility
    - curiosity
    - respect_for_boundaries

