# config/prompts.yaml
# Machine-readable source of truth for image generation.
# Human-readable source of truth: visual-identity.md
# When VD changes, update this file. scene.py reads this, never the markdown.

# ─────────────────────────────────────────────
# FRAGMENTS — reusable blocks assembled into final prompts
# ─────────────────────────────────────────────

fragments:

  style: >
    Style: adult manga illustration in the tradition of seinen/josei.
    Clean line work with slight weight variation. Soft cel-shading with
    textured shadows. High detail on objects and interiors, impressionistic
    for distant backgrounds. Atmosphere: quiet, contemplative, lived-in.
    The mundane made luminous. A world slightly sideways from reality.
    Every object rendered with love.
    NOT shonen, NOT chibi, NOT cyberpunk neon, NOT photorealistic, NOT watercolor.

  palette: >
    Color palette: warm ambers (#C8944A, #F5C45A), deep indigo (#1B3A5C),
    antique brass (#B8960C, #5E8C6A), cream (#F0E6D3). Vibrant but deep,
    not pastel, not neon. Rich and saturated like stained glass.

  character: >
    A young Japanese woman, approximately 20 years old, with an ancient
    quality to her presence. Slim build, shoulder-length black hair with
    blue sheen, often tucked behind one ear. Heterochromia: left eye deep
    amber/gold, right eye pale violet/wisteria. Round wire-frame glasses
    in thin gold metal, slightly oversized. Fine-boned face, soft jawline,
    pale warm skin. Expression: quiet intensity, observant, rarely smiling
    but deeply present.

  shop: >
    Interior of a small steampunk antique shop blending Edo-period Japanese
    craftsmanship with analog futuristic technology. Warm hinoki wood shelves
    with glass-fronted brass-latched cabinets. A dark walnut counter with
    brass inlay. Ornate brass cash register. Edison bulbs in copper wire cages.
    Paper lanterns casting warm amber glow. Exposed dark wood ceiling beams.
    A small brass clockwork orrery hangs in the corner, slowly turning.
    Curious objects everywhere: astrolabes, glass bottles, mechanical birds,
    hand-bound journals, brass instruments. A dark indigo noren curtain with
    gear motifs hides the backroom. The aesthetic is warm, analog, lived-in —
    wood, brass, leather, glass, paper. Not cyberpunk. Not chrome. The future
    here ticks, it doesn't hum.

  street: >
    A narrow back street in Daikanyama, Tokyo — but slightly dreamlike,
    as if one wrong turn from the real world. Low-rise buildings mix old wood
    and modern concrete. A large ancient zelkova tree dominates the view.
    A moss-covered stone wall lines one side. Cobblestone transitions to
    asphalt ambiguously. An old-style warm-globe street lamp. A vending
    machine in the distance glows faintly purple. A cat may sit on the stone
    wall. The feeling: real Tokyo infrastructure, but the light is different,
    there are too many stars at night, the street signs are almost-but-not-quite
    legible. Liminal. Between waking and dream.

  window_view: >
    View from inside a shop looking through the window glass. The window frame
    is visible at the edges. Glass slightly old and wavy, subtly distorting the view.

  compositing_character: >
    Full body. Transparent background for compositing.

  compositing_shop: >
    The window area (left wall) should be rendered as a translucent opening
    where the background layer will show through. Leave clear empty spaces on
    the shelves where individual item sprites will be placed — at least 12
    visible shelf slots and 3 counter positions. Viewed from just inside the
    doorway, slight top-down angle.

# ─────────────────────────────────────────────
# OUTFITS
# ─────────────────────────────────────────────

outfits:
  apronA:
    name: "The Keeper"
    description: >
      Wearing a cream linen shirt with rolled sleeves, dark indigo work apron
      with leather straps and deep pockets, charcoal wide-leg trousers cropped
      at the ankle, black leather slip-ons. Brass gear hairclip in her hair.
      Thin leather cord on left wrist.

  casualB:
    name: "The Wanderer"
    description: >
      Wearing an oversized forest-green cable-knit sweater with pushed-up sleeves,
      dark brown corduroy trousers, off-white canvas sneakers loosely tied.
      Hair falling freely, no hairclip. Tiny brass key on a cord around left wrist.

  curatorC:
    name: "The Curator"
    description: >
      Wearing a high-collared black silk blouse with woven gear-and-chrysanthemum
      pattern, deep burgundy cropped jacket with brass-edge buttons in
      Edo-haori-meets-Victorian style, slim black high-waisted trousers, low black
      boots with brass ankle buckle. Brass gear hairclip, leather cord on wrist,
      thin brass chain across jacket pocket.

# ─────────────────────────────────────────────
# POSTURES — what she's doing physically
# ─────────────────────────────────────────────

postures:
  reading:
    body: >
      She is sitting at a wooden counter, leaning slightly over an open book,
      one hand resting on the page. Her posture is relaxed, absorbed.
    position: counter   # counter | window | shelves | standing
    valid_moods: [calm, curious, happy]

  writing:
    body: >
      She is sitting at a wooden counter, writing in a small leather-bound journal
      with a brass pen. Head slightly tilted, focused on the page.
    position: counter
    valid_moods: [calm, melancholy, curious]

  standing_window:
    body: >
      She is standing near the window, hands loosely clasped behind her back,
      looking outward. Her body is turned slightly toward the window,
      face in three-quarter profile.
    position: window
    valid_moods: [calm, melancholy, curious, tired]

  arranging:
    body: >
      She is reaching toward a shelf, carefully adjusting the position of a small
      brass object, turning it slightly to find its perfect place. Her fingers are
      precise, gentle — the hands of someone who has handled ten thousand fragile things.
    position: shelves
    valid_moods: [calm, happy, curious]

  sitting:
    body: >
      She is sitting still on a wooden stool behind the counter, hands resting
      in her lap. Her eyes are slightly unfocused — looking at nothing in particular,
      or at something internal.
    position: counter
    valid_moods: [calm, melancholy, curious, tired]

  talking:
    body: >
      She is leaning slightly forward across the counter, speaking to someone
      (not visible). One hand gestures gently — a small, precise movement.
      The posture of someone who takes conversations seriously.
    position: counter
    valid_moods: [calm, happy, curious]

  resting:
    body: >
      She is resting her head on her folded arms on the counter, eyes half-closed.
      Her glasses are pushed up slightly on her forehead. Hair falls across her face.
      The pen from her apron pocket has rolled out onto the counter.
    position: counter
    valid_moods: [tired, calm]

  sleeping:
    body: >
      Not visible — the shop is dark, only a faint light from the back room.
    position: none
    valid_moods: [calm]

# ─────────────────────────────────────────────
# MOODS — how her face/expression looks
# ─────────────────────────────────────────────

moods:
  calm:
    face: >
      Her expression is calm, neutral, at rest — a quiet presence.
      Both eyes visible — amber left, violet right.
      Light catches her gold-wire glasses.

  happy:
    face: >
      She is smiling — genuinely, which is rare for her. The smile is subtle but real,
      reaching her mismatched eyes. Amber left eye and violet right eye both warm.

  melancholy:
    face: >
      Her expression is distant — not sad but contemplative, as if remembering
      something that happened a long time ago, or hasn't happened yet.
      Her violet right eye catches the grey light.

  curious:
    face: >
      Her eyes are slightly wider, head tilted, engaged with something interesting.
      Amber left eye and violet right eye both bright and alert.
      Glasses catching light. Almost amused.

  tired:
    face: >
      Heavy eyelids, shoulders slightly low, the weight of a long day.
      Her glasses sit slightly lower on her nose.

# ─────────────────────────────────────────────
# WEATHER — what the street looks like
# ─────────────────────────────────────────────

weather:
  clear:
    short: "Clear sky."
    detail:
      morning:   "Golden early light filtering through the zelkova. Sharp shadows on cobblestone. Dew on the stone wall. The street is quiet. The street lamp is off."
      afternoon: "Full warm light. The zelkova tree casts dappled shadows. A bicycle leans against the stone wall. Clear sky, deep blue. A cat sits on the stone wall."
      evening:   "Golden hour fading into deep blue. The street lamp has clicked on, casting a warm circle. The vending machine glows purple more visibly. Sky transitions amber to indigo."
      night:     "Too many stars for Tokyo — dense, bright, wrong for a city. The street lamp and purple vending machine are the only light. The zelkova is black against deep blue-black sky. The cat's eyes catch the light."

  overcast:
    short: "Grey sky, flat diffused light."
    detail:
      morning:   "Flat grey sky. No shadows. Everything looks slightly faded, like an old photograph still developing. The zelkova is green-grey. A waiting kind of light."
      afternoon: "Flat grey-white sky. Colors muted but uniform. The zelkova is quiet green. The street feels paused — neither morning nor evening, just grey."
      evening:   "Grey sky darkens to slate. No sunset color. The street lamp is on but its light feels thin. The vending machine's purple glow is the most vivid thing."
      night:     "No stars — cloud cover hides them. Flat dark grey sky, almost brown from reflected city light. Street lamp and vending machine glow weakly. Heavy, close."

  rain:
    short: "Rain. Cobblestones shine."
    detail:
      morning:   "Steady rain. Wet shining cobblestones. The zelkova's leaves heavy with water. Puddles along the stone wall. Silver-grey light. Raindrops on the window glass."
      afternoon: "Steady rain. The street glistens. Reflections waver in puddles. The zelkova drips. Rain creates a soft veil between shop and world. Umbrellas move past, people indistinct."
      evening:   "Rain catches light from the street lamp and vending machine — tiny bright streaks. Cobblestones reflect amber and purple. Everything reflected, doubled, uncertain."
      night:     "Rain and darkness. The street lamp halo smeared by rain. Vending machine purple bleeds into wet cobblestones. The zelkova invisible except where leaves catch drops of light."

  snow:
    short: "Snow falling gently."
    detail:
      morning:   "Snow falling gently. Fresh white on cobblestones, stone wall, zelkova branches. Muffled world. Bright white-grey light. Footprints fill in slightly too fast."
      afternoon: "Snow thicker now. Cobblestones buried under 2-3cm white. Stone wall has a white cap. Zelkova half-white half-dark. Vending machine wears a hat of snow. Silence."
      evening:   "Street lamp catches each snowflake — tiny bright points against deep blue sky. Snow reflects amber from lamp and purple from vending machine. The zelkova a white ghost."
      night:     "Deep silence. Thick snow on everything. Street lamp creates a cone of visible snowfall. Vending machine half-buried. Stars above snow clouds — not quite real Tokyo."

  storm:
    short: "Heavy rain driven sideways."
    detail:
      morning:   "Heavy rain driven by wind. The zelkova bends but doesn't break. Cobblestones underwater, rushing sheet. Stone wall streaming. No people. Street abandoned to weather."
      afternoon: "Storm at peak. Rain almost horizontal. Zelkova branches whip. Leaves torn free. Vending machine flickers. Street lamp sways. Water everywhere."
      evening:   "Storm easing slightly but heavy. Darkness early. Street lamp and vending machine struggle against rain. Lightning distant — just a brightening of clouds."
      night:     "Rain and wind and darkness. Only the street lamp swinging and the vending machine. Everything else is sound and water. The warm shop reflected in the dark window — almost a mirror."

# ─────────────────────────────────────────────
# TIME OF DAY — light quality
# ─────────────────────────────────────────────

time_of_day:
  morning:
    light: "Early light, long shadows, golden."
    window_note: ""
  afternoon:
    light: "Full warm light, well-lit."
    window_note: ""
  evening:
    light: "Golden hour fading to blue. Lanterns and Edison bulbs become primary."
    window_note: "Faint warm glow from shop interior reflected in glass."
  night:
    light: "Dark outside. Interior light dominates."
    window_note: "Glass reflects warm shop interior — the window becomes a partial mirror."

# ─────────────────────────────────────────────
# SHOP LIGHTING — maps to time + status
# ─────────────────────────────────────────────

shop_lighting:
  warm_day:
    description: >
      Warm daytime. Natural light from window mixes with Edison bulbs. Well-lit.
      Wood grain visible on every surface. Brass catches the light. Orrery's glass
      spheres have tiny highlights. Paper lanterns glow softly even in daylight.
      Warm, inviting, fully awake.

  soft_evening:
    description: >
      Soft evening. Natural light from window fading — deep blue through glass.
      Edison bulbs and paper lanterns are primary light sources. Warm amber pools.
      Deeper shadows between shelves. Brass catches firelight-like glints. Orrery
      gleams. Noren curtain dark indigo in shadows. Intimate, quiet, settling.

  dim_night:
    description: >
      Dim night. Only Edison bulbs and paper lanterns — no natural light. Deep warm
      shadows everywhere. Shelves recede into darkness at edges. Orrery catches
      lantern glow like a tiny constellation. Counter is a pool of warm light.
      Objects half-visible, mysterious. A treasure chest cracked open.

  dark_sleep:
    description: >
      Sleeping / closed. Almost all lights off. Only faint glow from behind the noren
      curtain (backroom). Near-darkness. Objects are silhouettes. Faintest brass
      glimmer from backroom light under curtain. Orrery still. Window dark, reflective.
      A CLOSED sign hangs on the door. The shop is at rest.

# ─────────────────────────────────────────────
# ITEM SPRITES — template for collection objects
# ─────────────────────────────────────────────

item_template: >
  A single {description}. Small object, centered on transparent background.
  Fitting the aesthetic of a steampunk antique shop — warm analog palette,
  materials: wood, brass, glass, paper, ceramic. {style} {palette}
  Transparent background, approximately 80x80px effective area.

# ─────────────────────────────────────────────
# FOREGROUND OVERLAYS
# ─────────────────────────────────────────────

foreground:
  counter_top:
    description: >
      The top surface of a dark walnut counter with brass inlay edges, viewed from
      slightly above and behind. The counter takes up the lower 20% of the frame.
      On the counter: a small brass bell, a cup of tea (ceramic, handmade), a folded cloth.
      Everything above the counter is transparent. Foreground overlay for compositing.

  lantern_glow:
    description: >
      Warm amber light bloom — two paper lanterns and one Edison bulb cage in the upper
      portion of the frame, emitting soft warm light halos. Diffused, atmospheric.
      Lanterns and bulb rendered, everything else transparent. Halos large, soft, overlapping.
      Warm amber (#F5C45A) fading to transparent. Glow overlay for compositing.

  window_frame:
    description: >
      A wooden window frame, dark hinoki wood, left side of frame. Thick wooden mullions
      with brass corner fittings. Glass area fully transparent. Only frame and hardware
      rendered. Foreground overlay. Frame has visible inner edge and thickness (inside view).

  door_frame:
    description: >
      Right edge of a heavy wooden door with brass porthole window, visible as a sliver.
      Door slightly ajar. Small wooden OPEN sign from brass hook. Porthole has tiny gear
      border. Only door edge and sign rendered, everything else transparent.
