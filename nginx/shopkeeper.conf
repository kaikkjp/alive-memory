# Nginx configuration for the Shopkeeper Window UI (BARE-METAL deployment)
#
# For Docker Compose deployment, use deploy/nginx.conf instead.
#
# Serves:
#   /            → Next.js static export (window/out/)
#   /assets/     → Sprite/image assets (7-day cache, immutable)
#   /ws/         → WebSocket proxy to heartbeat_server (port 8765)
#   /api/        → REST API proxy to heartbeat_server (port 8080)
#
# SSL is managed by Certbot (Let's Encrypt).
# After running certbot --nginx, it will add ssl_certificate directives
# to the HTTPS server block automatically.
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/shopkeeper
#   2. ln -s /etc/nginx/sites-available/shopkeeper /etc/nginx/sites-enabled/
#   3. certbot --nginx -d shopkeeper.tokyo
#   4. nginx -t && sudo systemctl reload nginx

# ─── CORS origin allowlist ───
# Map the request Origin header to an allowed value.
map $http_origin $cors_origin {
    default                                "";
    "~^https://shopkeeper\.tokyo$"         $http_origin;
    "~^https://www\.shopkeeper\.tokyo$"    $http_origin;
}

upstream shopkeeper_ws {
    server 127.0.0.1:8765;
}

upstream shopkeeper_api {
    server 127.0.0.1:8080;
}

# HTTP → HTTPS redirect (certbot will modify this block)
server {
    listen 80;
    server_name shopkeeper.tokyo;

    # Next.js static export
    root /var/www/shopkeeper/window/out;
    index index.html;

    # ─── Static assets (sprites, backgrounds, etc.) ───
    location /assets/ {
        alias /var/www/shopkeeper/window/public/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin $cors_origin;
        try_files $uri =404;
    }

    # ─── WebSocket proxy ───
    location /ws/ {
        proxy_pass http://shopkeeper_ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ─── REST API proxy ───
    location /api/ {
        proxy_pass http://shopkeeper_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — restricted to allowed origins (see map block above)
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Vary "Origin" always;

        # Handle OPTIONS preflight at nginx level
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Access-Control-Max-Age 86400;
            add_header Vary "Origin";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ─── OG image (cacheable) ───
    location = /api/og {
        proxy_pass http://shopkeeper_api/api/og;
        proxy_set_header Host $host;
        proxy_cache_valid 200 5m;
    }

    # ─── Next.js static pages ───
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
