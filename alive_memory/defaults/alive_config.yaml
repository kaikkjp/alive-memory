# alive-memory default cognitive parameters
# Override by passing config dict or YAML path to AliveMemory()

memory:
  embedding_dimensions: 384

intake:
  base_salience: 0.5
  conversation_boost: 0.2     # Conversations get salience bump
  novelty_weight: 0.3

drives:
  equilibrium_pull: 0.02      # Rate drives return to 0.5
  diminishing_returns: 0.8    # Multiplier for repeated stimuli
  social_sensitivity: 0.5     # How much social events affect social drive

consolidation:
  decay_rate: 0.01            # Kept for meta-controller compat
  decay_floor: 0.05
  dream_count: 3              # Number of dreams per consolidation
  reflection_count: 2         # Number of reflections per consolidation
  nap_moment_count: 5         # Max moments to process during nap
  cold_embed_limit: 50        # Max embeddings to create per sleep cycle

recall:
  default_limit: 10
  context_lines: 3            # Lines of context around grep matches

identity:
  snapshot_interval: 10       # Consolidation cycles between snapshots
  drift_window: 50            # Cycles to look back for drift detection
  drift_threshold: 0.15       # Trait change magnitude to flag as drift
  ema_alpha: 0.05             # EMA smoothing for trait updates
  trait_bounds_min: 0.0       # default lower bound for traits
  trait_bounds_max: 1.0       # default upper bound for traits
  notable_threshold: 0.3      # composite drift score → notable
  significant_threshold: 0.6  # composite drift score → significant
  cooldown_cycles: 5          # min cycles between drift events
  max_updates_per_sleep: 5    # guard rail: max corrections per sleep
  min_sustained_cycles: 3     # guard rail: min cycles before accept
  narrative_regen_threshold: 0.2  # trait delta to trigger narrative regen

sleep:
  fault_tolerant: true
  enable_whispers: true
  enable_meta_review: true
  enable_meta_controller: true
  enable_identity_evolution: true
  enable_wake: true
