# high_curiosity.yaml — amplified curiosity & exploration drive
# Tests whether stronger curiosity produces richer autonomous behavior
# without destabilizing mood or causing rumination.

hypothalamus:
  valence_hard_floor: -0.85
  max_valence_delta_per_cycle: 0.10
  valence_equilibrium: 0.05
  exponential_spring_distance: 0.5
  exponential_spring_multiplier: 3.0
  feeling_curiosity_high: 0.55           # lowered from 0.7 — triggers "curious" feeling sooner
  feeling_curiosity_mid: 0.35            # lowered from 0.5
  feeling_curiosity_low: 0.10            # lowered from 0.15

cortex:
  daily_cycle_cap: 500
  rumination_threshold: 8                # raised from 5 — more patience before decay
  rumination_decay_factor: 0.15          # halved from 0.3 — slower thread abandonment
  idle_temperature: 0.5                  # raised from 0.4 — more creative idle thought
  engage_temperature: 0.7

basal_ganglia:
  disengagement_expression_threshold: 0.8  # raised — harder to disengage (stays curious)
  disengagement_impulse_threshold: 0.3     # lowered — more willing to re-engage
