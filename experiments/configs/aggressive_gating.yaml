# aggressive_gating.yaml — tighter homeostatic control & action gating
# Tests whether stricter drive thresholds produce more efficient
# behavior (fewer wasted cycles) without causing emotional flatness.

hypothalamus:
  valence_hard_floor: -0.70              # tighter floor — prevents deep negativity
  max_valence_delta_per_cycle: 0.06      # reduced from 0.10 — smoother mood transitions
  valence_equilibrium: 0.05
  exponential_spring_distance: 0.35      # tighter from 0.5 — spring kicks in sooner
  exponential_spring_multiplier: 4.0     # stronger from 3.0 — faster snap-back

habit_policy:
  journal:
    expression_threshold: 0.75           # raised from 0.6 — must be really expressive
    cooldown_cycles: 120                 # raised from 80 — longer cooldown
    max_per_day: 2                       # reduced from 3
    priority: 0.65                       # lowered from 0.75 — journals lose to other actions

cortex:
  daily_cycle_cap: 300                   # reduced from 500 — tighter budget
  max_consecutive_failures: 2            # reduced from 3 — faster circuit break
  circuit_open_seconds: 600              # doubled from 300 — longer cooldown
  rumination_threshold: 3                # reduced from 5 — faster thread rotation
  rumination_decay_factor: 0.5           # raised from 0.3 — harsher decay

basal_ganglia:
  disengagement_expression_threshold: 0.5  # lowered — easier to disengage
  disengagement_impulse_threshold: 0.6     # raised — harder to re-engage

sleep_meta:
  drive_deviation_threshold: 0.3         # tighter from 0.4 — more reverts
  auto_promote_threshold: 3              # reduced from 5 — faster habit promotion
