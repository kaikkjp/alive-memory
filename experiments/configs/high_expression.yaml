# high_expression.yaml — amplified journaling & self-expression drive
# Tests whether more frequent expressive output improves mood stability
# and produces richer sleep consolidation material.

hypothalamus:
  valence_hard_floor: -0.85
  max_valence_delta_per_cycle: 0.10
  valence_equilibrium: 0.05
  exponential_spring_distance: 0.5
  exponential_spring_multiplier: 3.0
  feeling_expression_high: 0.5           # lowered from 0.7 — triggers "need to express" sooner

habit_policy:
  journal:
    expression_threshold: 0.4            # lowered from 0.6 — journals fire earlier
    cooldown_cycles: 50                  # reduced from 80 — shorter cooldown
    max_per_day: 5                       # raised from 3 — more journals per day
    priority: 0.85                       # raised from 0.75 — journals win more often
    diminishing_factor: 0.7              # raised from 0.6 — less penalty per journal

cortex:
  daily_cycle_cap: 500
  rumination_threshold: 5
  rumination_decay_factor: 0.3

sleep_consolidation:
  journal_mood_bonus: 0.06               # raised from 0.04 — bigger sleep quality boost
  journal_mood_bonus_cap: 0.15           # raised from 0.1
