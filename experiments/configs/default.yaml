# default.yaml — baseline configuration (mirrors alive_config.yaml)
# Use as control in parameter sweep experiments.

hypothalamus:
  valence_hard_floor: -0.85
  max_valence_delta_per_cycle: 0.10
  valence_equilibrium: 0.05
  exponential_spring_distance: 0.5
  exponential_spring_multiplier: 3.0

habit_policy:
  journal:
    expression_threshold: 0.6
    cooldown_cycles: 80
    max_per_day: 3
    priority: 0.75

cortex:
  daily_cycle_cap: 500
  rumination_threshold: 5
  rumination_decay_factor: 0.3
  idle_temperature: 0.4
  engage_temperature: 0.7

basal_ganglia:
  disengagement_expression_threshold: 0.7
  disengagement_impulse_threshold: 0.4

sleep_meta:
  trait_stability_increment: 0.2
  drive_deviation_threshold: 0.4
  auto_promote_threshold: 5
